<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables</title>
  </head>
  <body>
    <table border="1">
      <tr>
        <th>Hobbies</th>
        <th>Best Movies</th>
      </tr>
      <tr>
        <td>Learning</td>
        <td>The Boys</td>
      </tr>
      <tr>
        <td>Dancing</td>
        <td>Avengers</td>
      </tr>
      <tr>
        <td>action</td>
        <td>music</td>
      </tr>
    </table>
    <br />

    <table border="1">
      <!-- Colspan ka use  -->
      <tr>
        <th colspan="3">Hobby</th>
      </tr>
      <tr>
        <th>Hobby 1</th>
        <th>Hobby 2</th>
        <th>Hobby 3</th>
      </tr>
      <tr>
        <td>Learning</td>
        <td>Dancing</td>
        <td>Cooking</td>
      </tr>
    </table>
    <br />

    <!-- Rowspan ka use -->
    <table border="1">
      <tr>
        <th>Name</th>
        <th>Subject</th>
      </tr>
      <tr>
        <td rowspan="4">Ram</td>
        <!-- 2 rows cover karega -->
        <td>Math</td>
      </tr>
      <tr>
        <!-- Ram yahan nahi likhenge, rowspan handle karega -->
        <td>Science</td>
      </tr>
      <tr>
        <td>Biology</td>
      </tr>
      <tr>
        <td>Css</td>
      </tr>
    </table>
    <br />
    <table border="1">
      <tr>
        <th>Name</th>
        <th>Documents</th>
      </tr>
      <tr>
        <td rowspan="4">Mohit</td>
        <td>Aadhar Card</td>
      </tr>
      <tr>
        <td>Pan Card</td>
      </tr>
      <tr>
        <td>Rasion Card</td>
      </tr>
      <tr>
        <td>Voter ID</td>
      </tr>
    </table>
  </body>
</html>

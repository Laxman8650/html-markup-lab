<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchor,Image & video Tag</title>
  </head>
  <body>
    <!-- Anchor Tags Href-Hyperlink(hyperefrence), 
     target-_Blank(navigate to one page to another page) -->
    <a href="https://www.google.com/" target="_blank">Google</a><br />
    <a href="https://www.youtube.com/" target="_blank">Youtube</a><br />
    <a href="https://www.facebook.com/" target="_blank">Facebook</a><br />

    <!-- Download link -->
    <a href="Mohit.jpg" download="image_file">Download Picture</a><br />

    <!-- Image Tag -->
    <h2>This is Parrot's Image</h2>
    <img
      src="/image/mohit.jpg"
      alt="Mohit Image"
      width="200px"
      height="300px"
    /><br />

    <!-- Video Tag -->
    <h2>This is Bell's Video</h2>
    <video
      src="/assets/mohit.mp4"
      type="video/mp.4"
      width="200px"
      controls
      muted
      loop
    ></video>
    <br />

    <!-- External Path  -->
    <h2>Your Dream is to Become a Developer</h2>
    <img
      src="https://img.magnific.com/free-photo/courage-man-jump-through-gap-hill-business-concept-idea_1323-262.jpg?semt=ais_hybrid&w=740&q=80"
      alt="Sunrise"
      width="500px"
      height="300px"
    />
    <br />

    <!-- Audio Tag -->
    <h2>Saaho BGM</h2>
    <audio src="/assets/saaho_bgm.mp3" controls loop></audio>

    <audio src="/assets/i-can-do-anything.mp3" controls loop muted></audio>
    <br />
    <iframe
      width="110"
      height="200"
      src="https://www.myinstants.com/instant/i-can-do-anything-68535/embed/"
      frameborder="0"
      scrolling="no"
    ></iframe>
  </body>
</html>

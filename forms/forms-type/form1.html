<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form1</title>
  </head>
  <body>
    <h1>Fill this form</h1>
    <form action="index.html" method="post">
      <label for="name">Your Name: </label>
      <input type="text" name="name" placeholder="exm.rahul" required />
      <br />
      <label for="email">Email: </label>
      <input
        type="email"
        name="email"
        id="user_email"
        placeholder="abc@gmail.com"
        required
      />
      <br />
      <label for="Phone">Phone_no:</label>
      <input type="tel" name="phone_no" id="phone_number" />
      <br />
      <label for="password">Password:</label>
      <input type="password" name="password" id="pass" />
      <br />
      <label for="Dob">Dob: </label>
      <input type="date" name="dob" id="age" />
      <br />
      <label for="gender">Gender:</label>
      <input type="radio" name="gender" id="male" value="male" />Male
      <input type="radio" name="gender" id="female" value="female" />Female
      <input type="radio" name="gender" id="other" value="other" />Other
      <br />
      <label for="city">Select City: </label>
      <select name="city" id="city">
        <option value="chamoli">Chamoli</option>
        <option value="dheradun">Dheradun</option>
        <option value="nanital">Nanital</option>
        <option value="champavat">Champavat</option>
        <option value="Haridwar">Haridwar</option>
      </select>
      <br />
      <button type="submit">Submit Form</button>
    </form>
  </body>
</html>
